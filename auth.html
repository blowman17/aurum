    <a href="cart.html" class="nav-cart">Cart <span class="cart-badge">0</span></a>
    <a href="auth.html" class="nav-cta" id="auth-nav-link">Sign In</a>
  </div>
</nav>

<main id="swup" class="transition-fade">
<div class="page-hero" style="padding-bottom:3rem; min-height:40vh; display:flex; flex-direction:column; justify-content:center;">
  <div class="orb orb-1"></div>
  <h1 class="page-title"><em>Account</em></h1>
</div>

<div class="checkout-container" style="max-width: 500px; margin: 0 auto; display: block; grid-template-columns: 1fr;">
  
  <div class="checkout-form" id="auth-container">
    <div style="display:flex; gap:1rem; margin-bottom: 2rem; border-bottom: 1px solid rgba(245,240,232,0.2); padding-bottom: 1rem;">
      <button class="status-btn active" id="tab-login" style="flex:1; padding: 0.5rem; background:transparent; border:none; color:var(--gold); font-size:1.1rem; cursor:pointer;" onclick="switchTab('login')">Sign In</button>
      <button class="status-btn" id="tab-register" style="flex:1; padding: 0.5rem; background:transparent; border:none; color:rgba(245,240,232,0.5); font-size:1.1rem; cursor:pointer;" onclick="switchTab('register')">Create Account</button>
    </div>

    <form id="auth-form">
      <div class="form-row full" id="name-field" style="display: none;">
        <div class="form-group"><label for="fullName">Full Name</label><input type="text" id="fullName" /></div>
      </div>
      <div class="form-row full">
        <div class="form-group"><label for="email">Email Address *</label><input type="email" id="email" required /></div>
      </div>
      <div class="form-row full">
        <div class="form-group" style="position: relative;">
          <label for="password">Password *</label>
          <input type="password" id="password" required minlength="6" style="padding-right: 50px;" />
          <button type="button" id="toggle-password" style="position: absolute; right: 10px; bottom: 8px; background: none; border: none; color: var(--gold); font-family: var(--font-primary); font-size: 1rem; cursor: pointer; padding: 5px; height:30px; display:flex; align-items:center; justify-content:center;">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-pay" id="auth-btn">Sign In</button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center;">
      <button type="button" id="google-auth-btn" class="btn-ghost" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.8rem; padding: 1.1rem 2rem; border: 1px solid rgba(245,240,232,0.15); background: transparent; color: var(--gold); font-family: var(--font-primary); text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem; cursor: pointer; transition: background 0.3s, color 0.3s;" onmouseover="this.style.background='rgba(245,240,232,0.05)'" onmouseout="this.style.background='transparent'">
        <svg width="20" height="20" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill="currentColor" d="M47.532 24.5528C47.532 22.9214 47.3997 21.2811 47.1175 19.6761H24.48V28.9181H37.4434C36.9055 31.8988 35.177 34.5356 32.6461 36.2111V42.2078H40.3801C44.9217 38.0278 47.532 31.8547 47.532 24.5528Z"/>
          <path fill="currentColor" d="M24.48 48.0016C30.9529 48.0016 36.4116 45.8764 40.3888 42.2078L32.6549 36.2111C30.5031 37.675 27.7253 38.5028 24.48 38.5028C18.2812 38.5028 12.9496 34.3108 11.0265 28.7118H3.03296V34.8824C7.0214 42.815 15.2813 48.0016 24.48 48.0016Z"/>
          <path fill="currentColor" d="M11.0051 28.7118C10.0143 25.8166 10.0143 22.6868 11.0051 19.7915V13.6209H3.03296C-0.371021 20.4005 -0.371021 28.1028 3.03296 34.8824L11.0051 28.7118Z"/>
          <path fill="currentColor" d="M24.48 9.49932C27.9016 9.44468 31.2086 10.7339 33.6866 13.0973L40.5387 6.24515C36.2081 2.22146 30.4359 -0.0658428 24.48 0.00161733C15.2813 0.00161733 7.0214 5.18821 3.03296 13.6209L11.0051 19.7915C12.9282 14.1925 18.26 10.0005 24.48 9.49932Z"/>
        </svg>
        Sign in with Google
      </button>
    </div>
    
    <div id="auth-message" style="margin-top: 1.5rem; padding: 1rem; border: 1px solid var(--gold); color:rgba(245,240,232,0.8); text-align: center; display:none; font-family:var(--font-secondary); line-height:1.5;"></div>
  </div>

  <div class="confirmation" id="auth-success" style="display:none; text-align:center;">
    <div class="confirmation-icon">✓</div>
    <h2>Welcome</h2>
    <p id="success-text">You have successfully signed in.</p>
    <a href="#" id="continue-btn" class="btn-primary" style="display:inline-block;margin-top:2rem;">Continue</a>
  </div>

</div>
</main>

  </div>
</footer>

</body>
